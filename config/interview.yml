# AI 面试准备助手项目总配置
# 这个文件用于统一管理项目的核心参数，后续各模块尽量都从这里读取配置，
# 避免把参数散落在代码里，方便后期维护和调优。

# =========================
# 1. 路径配置
# =========================
paths:
  # 固定知识库原始资料目录
  # 约定：把面试知识库资料直接放到 data/ 下
  knowledge_data_dir: data

  # 固定知识库向量库保存目录
  # 约定：把知识库向量直接放到 chroma_db/ 下
  vector_db_dir: chroma_db

  # 日志目录
  log_dir: logs

  # 提示词目录
  prompt_dir: prompts

  # 可选：上传文件临时保存目录
  # 如果后面做上传文件，这里可以先预留
  upload_dir: data/uploads

# =========================
# 2. 模型配置
# =========================
model:
  # 聊天模型名称
  chat_model_name: qwen3-max

  # 向量嵌入模型名称
  embedding_model_name: text-embedding-v4

  # 温度参数：越小越稳定，越大越发散
  temperature: 0.2

  # 最大输出长度，可根据实际模型能力调整
  max_tokens: 2048

# =========================
# 3. RAG 检索配置
# =========================
rag:
  # 检索返回的 top-k 数量
  top_k: 4

  # chunk 大小
  chunk_size: 300

  # chunk 重叠长度
  chunk_overlap: 50

  # 分隔符设置
  separators:
    - "\n\n"
    - "\n"
    - "."
    - "!"
    - "?"
    - "。"
    - "！"
    - "？"
    - " "
    - ""

  # 是否启用知识库去重
  enable_md5_dedup: true

  # md5 记录文件名
  md5_store_file: md5.text

# =========================
# 4. 简历解析配置
# =========================
resume:
  # 是否启用简历结构化抽取
  enable_structured_parse: true

  # 简历结构化字段
  fields:
    - education
    - skills
    - projects
    - internship

# =========================
# 5. JD 解析配置
# =========================
jd:
  # 是否启用 JD 结构化抽取
  enable_structured_parse: true

  # JD 结构化字段
  fields:
    - responsibilities
    - requirements
    - plus_points
    - keywords

# =========================
# 6. 面试题生成配置
# =========================
question_generation:
  # 默认生成题目数量
  default_count: 5

  # 允许的题目数量范围
  min_count: 3
  max_count: 10

  # 题目类型模板
  question_types:
    - self_introduction
    - project_experience
    - technical_fundamentals
    - job_matching
    - behavioral
    - weak_point_followup

# =========================
# 7. 评分配置
# =========================
scoring:
  # 评分总分
  total_score: 100

  # 评分维度
  dimensions:
    completeness: 30
    logic: 25
    professionalism: 25
    job_fit: 20

  # 评分结果是否返回详细分项
  return_detail: true

# =========================
# 8. 追问配置
# =========================
followup:
  # 默认生成追问数量
  default_count: 2

  # 是否允许多轮追问
  enable_multi_turn: true

  # 最大追问层数
  max_turns: 2

# =========================
# 9. 输出配置
# =========================
output:
  # 是否要求所有核心结果尽量结构化输出为 JSON
  structured: true

  # 是否保留调试信息
  include_debug_info: false

  # 是否保留检索到的上下文片段
  include_retrieved_context: true